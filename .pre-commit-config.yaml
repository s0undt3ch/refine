---
minimum_pre_commit_version: 4.0.0

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - --verbose

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict  # Check for files that contain merge conflict strings.
      - id: trailing-whitespace   # Trims trailing whitespace.
        args: [--markdown-linebreak-ext=md]
      - id: mixed-line-ending     # Replaces or checks mixed line ending.
        args: [--fix=lf]
      - id: end-of-file-fixer     # Makes sure files end in a newline and only a newline.
      - id: check-ast             # Simply check whether files parse as valid python.

  # ----- Local Hooks --------------------------------------------------------------------------->
  - repo: local
    hooks:
      - id: update-doc-stubs
        name: Update reference documentation stubs
        language: system
        entry: python .pre-commit-hooks/ref-doc-stubs.py
        files: ^(docs/.*\.md|src/refine/.*\.py)$
        pass_filenames: false
  # <---- Local Hooks ----------------------------------------------------------------------------

  # ----- s0undt3ch/pre-commit-hooks ------------------------------------------------------------>
  # These hooks run the system-installed (mise-pinned) tool from PATH, keeping a single source of
  # truth in ``mise.toml`` (binaries) and the project dependency groups (Python tools) — no
  # per-hook version pins to drift. See https://github.com/s0undt3ch/pre-commit-hooks
  - repo: https://github.com/s0undt3ch/pre-commit-hooks
    rev: v1.0.0
    hooks:
      - id: uv-lock
      - id: ruff-format
      - id: ruff-check
        args:
          - --fix
        exclude: (.pre-commit-hooks/.*|docs/.*)\.py
      - id: mypy
        name: Run mypy against the code base
        files: ^(src/|tests/|examples/).*\.py$
        exclude: ^tests/([^/]*/)*files/.*
      - id: actionlint
  # <---- s0undt3ch/pre-commit-hooks -------------------------------------------------------------
