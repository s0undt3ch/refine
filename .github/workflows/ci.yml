name: CI Workflow

on:
  - push
  - pull_request

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Set up mise & virtualenv
        uses: ./.github/actions/setup-virtualenv
        with:
          cache-prefix: pre-commit

      - name: Run Pre-commit
        run: |
          prek run --show-diff-on-failure --color=always --all-files

  tests:
    name: Test
    runs-on: ${{ matrix.os }}

    needs:
      - pre-commit

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Set up mise & virtualenv
        uses: ./.github/actions/setup-virtualenv
        with:
          python-version: ${{ matrix.python-version }}
          cache-prefix: tests

      - name: Run Tests
        run: |
          uv run coverage run -m pytest --color=yes

      - name: Report Coverage
        run: |
          uv run coverage combine
          uv run coverage report

  docs:
    name: Publish Docs
    runs-on: ubuntu-latest

    needs:
      - pre-commit
      - tests

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Set up mise & virtualenv
        uses: ./.github/actions/setup-virtualenv
        with:
          cache-prefix: docs
          uv-sync-args: --group docs

      - name: Build MkDocs site
        run: uv run mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
